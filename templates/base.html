<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sihcom Toon Tracker{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script>
        (function() {
            var savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h1 class="nav-title">Sihcom Toon Tracker</h1>
            <div class="nav-links">
                <a href="{{ url_for('dashboard') }}" class="nav-link {% if request.endpoint == 'dashboard' %}active{% endif %}">Dashboard</a>
                <a href="{{ url_for('fits') }}" class="nav-link {% if request.endpoint == 'fits' %}active{% endif %}">Fit Checker</a>
                <a href="{{ url_for('settings') }}" class="nav-link {% if request.endpoint == 'settings' %}active{% endif %}">Settings</a>
                <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode" title="Toggle dark mode">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path id="bulbIcon"/>
                    </svg>
                </button>
            </div>
        </div>
    </nav>

    <main class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>

    {% block scripts %}{% endblock %}

    <script>
        (function() {
            var toggle = document.getElementById('themeToggle');
            var icon = document.getElementById('bulbIcon');

            // Filled lightbulb (light mode = light is ON)
            var filledPath = 'M9 21c0 .55.45 1 1 1h4c.55 0 1-.45 1-1v-1H9v1zm3-19C8.14 2 5 5.14 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.86-3.14-7-7-7z';
            // Outline lightbulb (dark mode = light is OFF)
            var outlinePath = 'M9 21c0 .55.45 1 1 1h4c.55 0 1-.45 1-1v-1H9v1zm3-19C8.14 2 5 5.14 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.86-3.14-7-7-7zm1 14h-2v-2.07c0-.42-.23-.79-.57-1.07C8.82 11.54 8 10.34 8 9c0-2.21 1.79-4 4-4s4 1.79 4 4c0 1.34-.82 2.54-2.43 3.86-.34.28-.57.65-.57 1.07V16z';

            function updateIcon() {
                var theme = document.documentElement.getAttribute('data-theme') || 'light';
                icon.setAttribute('d', theme === 'light' ? filledPath : outlinePath);
            }

            updateIcon();

            if (toggle) {
                toggle.addEventListener('click', function() {
                    var current = document.documentElement.getAttribute('data-theme') || 'light';
                    var next = current === 'light' ? 'dark' : 'light';
                    document.documentElement.setAttribute('data-theme', next);
                    localStorage.setItem('theme', next);
                    updateIcon();
                });
            }
        })();
    </script>
</body>
</html>
